name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: modelwatch
          POSTGRES_PASSWORD: modelwatch
          POSTGRES_DB: modelwatch
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://modelwatch:modelwatch@localhost:5432/modelwatch
      MODEL_RUN_ID: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 backend/ dashboard/ scripts/ models/ --max-line-length=120 --ignore=E501,W503

      - name: Run tests
        run: |
          pip install pytest httpx
          pytest tests/ -v